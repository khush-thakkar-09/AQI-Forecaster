name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Configure Git credentials
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          
          # 2. Create a clean orphan branch containing only runtime files to bypass the 10MB limit
          git checkout --orphan hf-deploy
          git reset
          git add Dockerfile requirements.txt live_app.py pipeline.py model.py model_3.keras scaler.pkl
          git commit -m "Deploy to Hugging Face Space"
          
          # 3. Add Hugging Face Space as remote and force push the hf-deploy branch to HF's main
          git remote add hf https://khush-thakkar-09:$HF_TOKEN@huggingface.co/spaces/khush-thakkar-09/kolkata-aqi-forecaster
          git push --force hf hf-deploy:main